name: Deploy to GitHub Pages

# Publica el sitio automáticamente en GitHub Pages cada vez que se actualiza la rama main.
# (En Settings → Pages, elegí "Source: GitHub Actions".)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Habilita GitHub Pages automáticamente (build con Actions) si todavía
          # no está activado, así el primer deploy no falla con "Pages site not found".
          enablement: true
      # Sella la versión publicada (commit + fecha) para que el sitio detecte
      # nuevos deploys y se recargue solo. Lo lee js/main.js (autoRefresh).
      - name: Generar version.json
        run: |
          printf '{"commit":"%s","builtAt":"%s"}\n' \
            "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > version.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
